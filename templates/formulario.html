<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📮 Buzón de Mensajes</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/">📮 Buzón</a>
        <a href="/muro">📜 Muro</a>
    </nav>

    <main>
        <section class="hero">
            <h1>📮 Deja tu mensaje</h1>
            <p class="subtitulo">
                Escribe algo especial y compártelo en el muro.
            </p>
        </section>

        <section class="card">
            <form action="/enviar" method="POST">

                <label for="autor">Tu nombre</label>
                <input
                    type="text"
                    id="autor"
                    name="autor"
                    required
                    maxlength="40"
                    placeholder="¿Quién eres?"
                    autocomplete="name"
                >

                <label for="color">Tu color favorito</label>
                <input
                    type="color"
                    id="color"
                    name="color"
                    value="#6c2d82"
                    required
                >

                <p class="ayuda">
                    El color elegido aparecerá junto a tu mensaje en el muro.
                </p>

                <label for="mensaje">Tu mensaje</label>
                <textarea
                    id="mensaje"
                    name="mensaje"
                    required
                    rows="4"
                    maxlength="300"
                    placeholder="¿Qué quieres decir?"
                ></textarea>

                <button type="submit" class="btn-enviar">
                    📨 Enviar al muro
                </button>

            </form>
        </section>
    </main>

    <footer>
        <p>© {{ ano_actual }} — Buzón de Mensajes</p>
    </footer>
</body>
</html>
